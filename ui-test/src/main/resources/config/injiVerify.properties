# Other flags
explicitWaitTimeout=30
runOnBrowserStack = true

# Multiplier applied to explicitWaitTimeout specifically for scan verification result waiting.
# Increase this value if scan verification keeps loading under parallel/slow-app conditions.
# Total wait = explicitWaitTimeout * scanVerificationTimeoutMultiplier (e.g. 30 * 6 = 180s)
scanVerificationTimeoutMultiplier=6

# BrowserStack allows only 5 concurrent sessions; remaining threads are used for non-BrowserStack test cases.
# Scan tests run locally and generate large Y4M video files (15mp ≈ 660MB, 8mp ≈ 170MB per scenario).
# Running too many in parallel saturates CPU/memory and causes verification timeouts.
# Recommended: 4 for suites that include scan scenarios; 8 for BrowserStack-only suites.
browserstack_max_sessions = 5
parallel_thread_count = 4

