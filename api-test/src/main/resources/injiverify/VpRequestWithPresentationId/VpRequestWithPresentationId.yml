VpRequestWithPresentationId:
  Injiverify_CreateNewVerificationRequest_WithPresentationId_All_Valid_Smoke_Sid:
      endPoint: /v1/verify/vp-request
      description: Creates a VP request with a valid scope and returns vp_token details.
      uniqueIdentifier: TC_InjiVerify_VpRequestWithPresentationId_01
      role: noauth
      restMethod: post
      checkOnlyStatusCodeInResponse: true
      inputTemplate: injiverify/VpRequestWithPresentationId/VpRequestWithPresentationIdRequest
      outputTemplate: injiverify/responseCode
      input: '{
      "clientId": "did:web:mosip.github.io:inji-mock-services:openid4vp-service:docs",
      "nonce": "MTc2Mzk1NTY5NDI5NQ==",
      "scope": "200"
      }'
      output: '{
      "responseCode": "201"
}'

  Injiverify_CreateNewVerificationRequest_With_Invalid_PresentationId_Neg:
      endPoint: /v1/verify/vp-request
      description: Creates a VP request with an invalid scope
      uniqueIdentifier: TC_InjiVerify_VpRequestWithPresentationId_02
      role: noauth
      restMethod: post
      inputTemplate: injiverify/VpRequestWithPresentationId/VpRequestWithPresentationIdRequest
      outputTemplate: injiverify/VpRequestWithPresentationId/presentationDefinitionIdNegResult
      input: '{
      "clientId":"client123",
      "scope":"automationTestScope"
      }'
      output: '{
    "errorCode": "NO_DCQL_QUERY_FOR_SCOPE",
    "errorMessage": "No DCQL query found for the given scope."
}'

  Injiverify_CreateNewVerificationRequest_WithPresentationIdForVpSessionRequest_All_Valid_Smoke_Sid:
    endPoint: /v1/verify/vp-request
    description: Creates a VP request with a valid scope for VP session result
    uniqueIdentifier: TC_InjiVerify_VpRequestWithPresentationId_03
    role: noauth
    restMethod: post
    inputTemplate: injiverify/VpRequestWithPresentationId/VpRequestWithPresentationIdForVpSessionRequest
    outputTemplate: injiverify/VpRequestWithPresentationId/VpRequestWithPresentationIdForVpSessionResult
    input: '{
      "clientId": "injiverify.mosip.net",
      "nonce": "MTc2Mzk1NTY5NDI5NQ==",
      "acceptVPWithoutHolderProof": true,
      "responseCodeValidationRequired": true,
      "scope": "$SCOPE$"
    }'
    output: '{
      "responseCodeValidationRequired": "true",
      "responseType": "vp_token"
}'

  Injiverify_CreateNewVerificationRequest_WithPresentationIdForVpSessionRequest_withoutResponseCodeValidationRequired_Neg:
    endPoint: /v1/verify/vp-request
    description: Creates a VP request with responseCodeValidationRequired present but no value and expect 400 status code
    uniqueIdentifier: TC_InjiVerify_VpRequestWithPresentationId_04
    role: noauth
    restMethod: post
    inputTemplate: injiverify/VpRequestWithPresentationId/VpRequestWithPresentationIdForVpSessionRequest
    outputTemplate: injiverify/status
    input: '{
      "clientId": "injiverify.mosip.net",
      "nonce": "MTc2Mzk1NTY5NDI5NQ==",
      "acceptVPWithoutHolderProof": true,
      "responseCodeValidationRequired": "$IGNORE$",
      "scope": "$SCOPE$"
    }'
    output: '{
      "status": "400"
}'
  Injiverify_CreateNewVerificationRequest_WithPresentationIdForVpSessionRequest_invalidResponseCodeValidationRequired_Neg:
    endPoint: /v1/verify/vp-request
    description: Creates a VP request with invalid Response Code Validation Required parameter
    uniqueIdentifier: TC_InjiVerify_VpRequestWithPresentationId_05
    role: noauth
    restMethod: post
    inputTemplate: injiverify/VpRequestWithPresentationId/VpRequestWithPresentationIdForVpSessionRequest
    outputTemplate: injiverify/status
    input: '{
      "clientId": "injiverify.mosip.net",
      "nonce": "MTc2Mzk1NTY5NDI5NQ==",
      "acceptVPWithoutHolderProof": true,
      "responseCodeValidationRequired": "$IGNORE$",
      "scope": "$SCOPE$"
    }'
    output: '{
      "status": "400"
}'
