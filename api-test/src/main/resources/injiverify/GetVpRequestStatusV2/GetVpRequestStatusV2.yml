GetVpRequestStatusV2.yml:
  Injiverify_GetVpRequestStatus_V2_All_Valid_Smoke:
      endPoint: /v1/verify/v2/vp-results/{transactionId}
      description: Verify VP results in V2 end point
      uniqueIdentifier: TC_InjiVerify_GetVpRequestStatus_V2_01
