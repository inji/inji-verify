    endPoint: /v1/verify/vp-session-request
    description: Creates a VP request with a valid data for session request.
    uniqueIdentifier: TC_InjiVerify_VpRequestForSessionRequest_01
    role: noauth
    restMethod: post
    inputTemplate: injiverify/VpRequestForSessionRequest/VpRequestForSessionRequest
    outputTemplate: injiverify/VpRequestForSessionRequest/VpRequestForSessionRequestResult
    input: '{
