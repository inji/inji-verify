VcVerificationV2:
  Injiverify_VcVerification_V2_All_Valid_Smoke:
      endPoint: /v1/verify/v2/vc-verification
      description: Performing VC verification and expects the endpoint to validate the VC
      uniqueIdentifier: TC_InjiVerify_VcVerification_V2_01
      role: noauth
      restMethod: post
      inputTemplate: injiverify/VcVerificationV2/VcVerificationV2
      outputTemplate: injiverify/VcVerificationV2/VcVerificationResultV2
      input: '{
      "skipStatusChecks": false,
      "statusCheckFilters": ["revocation"],
      "includeClaims": true
      }'
      output: '{
      "allChecksSuccessful": true,
      "schemaAndSignatureCheck": {"valid": true,"error": null},
      "expiryCheck": {"valid": true},
      "statusCheck": [],
      "claims": {"fullName": "Mary Smith","dateOfBirth": "1975-08-22","mobileNumber": "8765432109"}
}'

  Injiverify_VcVerification_V2_WithOutVC_Neg:
      endPoint: /v1/verify/v2/vc-verification
      description: Performing VC verification without VC and expects the bad request response
      uniqueIdentifier: TC_InjiVerify_VcVerification_V2_02
      role: noauth
      restMethod: post
      checkOnlyStatusCodeInResponse: true
      inputTemplate: injiverify/empty
      outputTemplate: injiverify/responseCode
      input: '{
      }'
      output: '{
      "responseCode": "400"
}'

