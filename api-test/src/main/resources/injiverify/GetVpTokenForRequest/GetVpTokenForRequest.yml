GetVpTokenForRequest:
  Injiverify_GetVpTokenForRequest_All_Valid_Smoke:
      endPoint: /v1/verify/vp-result/{transactionId}
      description: Getting the VP token for the Request
      uniqueIdentifier: TC_InjiVerify_GetVpTokenForRequest_01
      role: noauth
      restMethod: get
      inputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequest
      outputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequestResult
      input: '{
      "transactionId":"$ID:CreateNewVerificationRequest_All_Valid_Smoke_Sid_transactionId$"
      }'
      output: '{
    "transactionId": "$ID:CreateNewVerificationRequest_All_Valid_Smoke_Sid_transactionId$",
    "vpResultStatus": "SUCCESS"
}'

  Injiverify_GetVpTokenForRequest_Invalid_TransactionId_Neg:
      endPoint: /v1/verify/vp-result/{transactionId}
      description: Getting the VP token for the Request with inavlid transaction id
      uniqueIdentifier: TC_InjiVerify_GetVpTokenForRequest_02
      role: noauth
      restMethod: get
      inputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequest
      outputTemplate: injiverify/error2
      input: '{
      "transactionId":"hgyghvgftA"
      }'
      output: '{
      "errorCode": "INVALID_TRANSACTION_ID"
}'

  Injiverify_GetVpTokenForRequest_NotFound_TransactionId_Neg:
    endPoint: /v1/verify/vp-result/{transactionId}
    description: Requesting a non-existent transactionId should return 404
    uniqueIdentifier: TC_InjiVerify_GetVpTokenForRequest_03
    role: noauth
    restMethod: get
    inputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequest
    outputTemplate: injiverify/responseCode
    checkOnlyStatusCodeInResponse: true
    input: '{
    "transactionId":"NON_EXISTENT_TRANSACTION_ID"
    }'
    output: '{
    "responseCode": "404"
    }'

  Injiverify_GetVpTokenForRequestWithProof_All_Valid_Smoke:
      endPoint: /v1/verify/vp-result/{transactionId}
      description: Getting the VP token for the Request
      uniqueIdentifier: TC_InjiVerify_GetVpTokenForRequest_04
      role: noauth
      restMethod: get
      inputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequest
      outputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequestResult
      input: '{
      "transactionId":"$ID:CreateNewVerificationRequest_WithProof_All_Valid_Smoke_Sid_transactionId$"
      }'
      output: '{
    "transactionId": "$ID:CreateNewVerificationRequest_WithProof_All_Valid_Smoke_Sid_transactionId$",
    "vpResultStatus": "SUCCESS"
}'

  Injiverify_GetVpTokenForRequestWithOutProof_All_Valid_Smoke:
      endPoint: /v1/verify/vp-result/{transactionId}
      description: Getting the VP token for the Request
      uniqueIdentifier: TC_InjiVerify_GetVpTokenForRequest_05
      role: noauth
      restMethod: get
      inputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequest
      outputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequestError
      input: '{
      "transactionId":"$ID:CreateNewVerificationRequest_WithoutVC_All_Valid_Smoke_Sid_transactionId$"
      }'
      output: '{
      "errorCode": "VP_WITHOUT_PROOF",
   "errorMessage": "Invalid VP Submission since VP is without proof"
}'  

  Injiverify_GetVpTokenForRequest_Of_PresentationID_All_Valid_Smoke:
      endPoint: /v1/verify/vp-result/{transactionId}
      description: Retrieves the verification result status of a VP submission for the given transactionId.
      uniqueIdentifier: TC_InjiVerify_GetVpTokenForRequest_06
      role: noauth
      restMethod: get
      inputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequest
      outputTemplate: injiverify/GetVpTokenForRequest/GetVpTokenForRequestResult
      input: '{
      "transactionId":"$ID:CreateNewVerificationRequest_WithPresentationId_All_Valid_Smoke_Sid_transactionId$"
      }'
      output: '{
    "transactionId": "$ID:CreateNewVerificationRequest_WithPresentationId_All_Valid_Smoke_Sid_transactionId$",
    "vpResultStatus": "SUCCESS"
}'
