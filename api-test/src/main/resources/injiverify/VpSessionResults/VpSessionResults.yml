VpSessionResults:
  Injiverify_VpSessionResults_All_Valid_Smoke:
      endPoint: /v1/verify/vp-session-results
      description: Verify VP session results with valid data
      uniqueIdentifier: TC_InjiVerify_VpSessionResults_01
      role: userDefinedCookie
      restMethod: post
      checkOnlyStatusCodeInResponse: true
      inputTemplate: injiverify/VpSessionResults/VpSessionResults
      outputTemplate: injiverify/responseCode
      input: '{
      "skipStatusChecks": false,
      "statusCheckFilters": ["revocation", "suspension"],
      "includeClaims": true,
      "responseCode": "$RESPONSE_CODE$",
      "cookie": "$TRANSACTION_COOKIE_TRUE$"
      }'
      output: '{
      "responseCode": "200"
}'
  Injiverify_VpSessionResults_Valid_withoutResponseCode_Smoke:
      endPoint: /v1/verify/vp-session-results
