      outputTemplate: injiverify/errorCodeAndMessage
      input: '{
      "skipStatusChecks": false,
      "statusCheckFilters": ["revocation", "suspension"],
      "includeClaims": true,
      "responseCode": "$RESPONSE_CODE$"
      }'
      output: '{
        "errorCode": "VP_SESSION_INVALID",
        "errorMessage": "Your VP verification session is invalid. Please restart the process and try again"
